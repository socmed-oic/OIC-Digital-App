<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIC Digital Hub - Login</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- LOGIN VIEW -->
    <div id="login-view" class="view-section active glass-container-center">
        <div class="glass-card login-card">
            <div class="login-header">
                <img src="img/logo.png" alt="Odilia Infinity Corp." class="login-logo">
                <h2>Welcome to OIC</h2>
                <p>Enter your PIN to access the spatial dashboard</p>
            </div>
            
            <div class="pin-display">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>

            <div class="pin-keypad">
                <button class="key">1</button>
                <button class="key">2</button>
                <button class="key">3</button>
                <button class="key">4</button>
                <button class="key">5</button>
                <button class="key">6</button>
                <button class="key">7</button>
                <button class="key">8</button>
                <button class="key">9</button>
                <button class="key action-key" id="pin-clear"><i class="fa-solid fa-delete-left"></i></button>
                <button class="key">0</button>
                <button class="key action-key" id="pin-enter"><i class="fa-solid fa-arrow-right"></i></button>
            </div>
            <div id="pin-error" class="error-msg"></div>
        </div>
    </div>

    <!-- App Logic -->
    <script src="js/app.js"></script>
</body>
</html>
